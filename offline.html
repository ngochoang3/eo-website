<!doctype html>
<html lang="vi" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Offline — EO Technology</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="image/icon.png" type="image/png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#060c18">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--c-text:#f1f5f9;--c-text-muted:#94a3b8;--c-accent-500:#0090e8}
html,body{height:100%;background:#060c18;color:var(--c-text);font-family:Inter,'Segoe UI',system-ui,-apple-system,sans-serif}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;min-height:100vh}
.icon{width:72px;height:72px;background:rgba(0,144,232,.1);border:1px solid rgba(0,144,232,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 24px}
h1{font-size:clamp(20px,5vw,32px);font-weight:800;margin-bottom:12px}
p{font-size:15px;color:var(--c-text-muted);max-width:400px;line-height:1.6;margin-bottom:32px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:8px;font-weight:600;font-size:14px;text-decoration:none;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:var(--c-accent-500);color:#fff}
.btn-primary:hover{background:#0080d0}
.btn-secondary{background:rgba(255,255,255,.07);color:var(--c-text);border:1px solid rgba(255,255,255,.12)}
.btn-secondary:hover{background:rgba(255,255,255,.12)}
.actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.tip{margin-top:40px;font-size:13px;color:var(--c-text-muted);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:12px 20px;max-width:360px}
.tip strong{color:var(--c-text);display:block;margin-bottom:4px}
a.logo{display:inline-flex;align-items:center;gap:10px;text-decoration:none;color:var(--c-text);font-weight:800;font-size:18px;margin-bottom:40px}
a.logo img{width:36px;height:36px}
</style>
</head>
<body>
<a href="index.html" class="logo">
  <img src="image/logo.png" alt="EO Technology">
  EO Technology
</a>

<div class="icon">📡</div>
<h1>Mất kết nối Internet</h1>
<p>Trang bạn yêu cầu chưa được lưu vào bộ nhớ đệm. Hãy kiểm tra kết nối và thử lại.</p>

<div class="actions">
  <button class="btn btn-primary" onclick="window.location.reload()">↻ Thử lại</button>
  <a href="index.html" class="btn btn-secondary">← Trang chủ</a>
</div>

<div class="tip">
  <strong>Trong khi chờ kết nối:</strong>
  Liên hệ qua Telegram <strong>t.me/eoiovn</strong> hoặc gọi trực tiếp — EO phản hồi trong 2 giờ làm việc.
</div>

<script>
window.addEventListener('online', () => window.location.reload());
</script>
</body>
</html>
